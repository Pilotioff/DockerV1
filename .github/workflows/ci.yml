name: CI Spring God Docker
on:
  push:
    branches:
      - main
jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test15b
    steps:
      - name: Descargar codigod
        uses: actions/checkout@v4
      - name: Instalar javagod 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Dar permisos al wrapper
        run: chmod +x mvnw
      - name: Compilar proyecto god
        run: ./mvnw clean package -DskipTests
      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Construir imagen Docker
        run: docker build -t pilotioff/backend-springboot:latest .
      - name: Publicar imagen en DockerHub
        run: docker push pilotioff/backend-springboot:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Construir imagen frontend
        run: docker build -t pilotioff/frontend-nativo:latest ./frontend_test
      - name: Publicar imagen frontend en DockerHub
        run: docker push pilotioff/frontend-nativo:latest

  deploy-backend:
    needs: build-backend
    runs-on: self-hosted
    steps:
      - name: Actualizar contenedor backend
        run: |
          cd /Users/delta/Downloads/proyecto_docker_compose_limpio
          docker compose pull backend
          docker compose up -d backend

  deploy-frontend:
    needs: build-frontend
    runs-on: self-hosted
    steps:
      - name: Actualizar contenedor frontend
        run: |
          cd /Users/delta/Downloads/proyecto_docker_compose_limpio
          docker compose pull frontend
          docker compose up -d frontend