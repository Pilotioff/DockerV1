name: CI Spring God Docker
on:
  push:
    branches:
      - main

jobs:
  build-backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: test15b

    steps:
      - name: Descargar codigod
        uses: actions/checkout@v4

      - name: Instalar javagod 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Dar permisos al wrapper
        run: chmod +x mvnw

      - name: Compilar proyecto god
        run: ./mvnw clean package -DskipTests

      - name: COnstruir imagen Docker
        run: docker build -t backend-springod