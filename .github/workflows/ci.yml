name: CI Spring God Docker
on:
  push:
    branches:
      - main

jobs:
  build-backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: test15b

    steps:
      - name: Descargar codigod
        uses: actions/checkout@v4

      - name: Instalar javagod 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Dar permisos al wrapper
        run: chmod +x mvnw

      - name: Compilar proyecto god
        run: ./mvnw clean package -DskipTests

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t pilotioff/backend-springboot:latest .

      - name: Publicar imagen en DockerHub
        run: docker push pilotioff/backend-springboot:latest
  
  deploy-backend:
    needs: build-backend
    runs-on: self-hosted

    steps:
      - name: Actualizar contenedor backend
        run: |
          cd /Users/delta/Downloads/proyecto_docker_compose_limpio
          docker-compose pull backend
          docker-compose up -d backend

      - name: Instalar Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Iniciar servicios con Docker Compose
        run: docker-compose up -d